<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AST Knowledge Bank</title>
    
    <script>
        window.MathJax = { 
            tex: { 
                inlineMath: [['$', '$']], 
                displayMath: [['$$', '$$']] 
            },
            chtml: {
                displayAlign: 'left',
                linebreaks: { automatic: true, width: 'container' }
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { --primary: #1890ff; --bg: #f4f7f9; --text: #1f2937; --danger: #ff4d4f; --accent: #722ed1; --bar-blue: #e6f7ff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; }
        
        .container { max-width: 1200px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; gap: 10px; flex-wrap: wrap; }
        .btn-group { display: flex; gap: 10px; }
        
        button { padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .add-btn { background: var(--accent); color: white; }
        .print-mode-btn { background: #fa8c16; color: white; }
        .do-print-btn { background: #52c41a; color: white; display: none; }
        
        .chapter-section { background: white; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e5e7eb; overflow: hidden; }
        
        .chapter-banner { 
            background: #f8fafc; padding: 18px 25px; font-size: 1.2rem; font-weight: 800; 
            color: var(--primary); border-bottom: 1px solid #f1f5f9; display: flex; 
            align-items: center; gap: 12px; cursor: pointer; user-select: none;
        }
        
        .fold-icon { margin-left: auto; transition: transform 0.3s; font-size: 0.9rem; opacity: 0.5; }
        .chapter-section.folded .fold-icon { transform: rotate(-90deg); }
        .chapter-section.folded .knowledge-container { display: none; }

        .knowledge-container { padding: 0 25px; }
        
        .knowledge-item { 
            position: relative; /* Needed for the background bar */
            padding: 20px 0; border-bottom: 1px solid #f1f5f9; display: flex; 
            align-items: flex-start; gap: 15px; width: 100%; z-index: 1;
        }
        .knowledge-item:last-child { border-bottom: none; }
        
        /* The Blue Horizontal Bar */
        .q-count-bar {
            position: absolute;
            left: 0;
            top: 4px;
            bottom: 4px;
            background: var(--bar-blue);
            z-index: -1; /* Place behind text */
            border-radius: 4px;
            transition: width 0.5s ease-out;
        }

        .content-display { font-size: 1.1rem; flex: 1; min-width: 0; line-height: 1.6; }

        .item-actions { 
            display: flex; 
            gap: 5px; 
            flex-shrink: 0; 
            align-self: flex-start; 
            padding-top: 5px;
            position: relative;
            z-index: 10;
        } 
        .action-btn { background: #fff; border: 1px solid #d1d5db; padding: 6px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .action-btn:hover { background: #f3f4f6; }
        
        .q-badge {
            background: var(--primary);
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
            margin-left: 4px;
        }

        .print-checkbox { display: none; width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
        body.selection-mode .print-checkbox { display: inline-block; }
        body.selection-mode .item-actions, body.selection-mode .add-btn { display: none; }
        body.selection-mode .do-print-btn { display: inline-block; }

        @media print {
            body { background: white; padding: 0; }
            .header, .item-actions, .add-btn, .print-mode-btn, .do-print-btn, .print-checkbox, .fold-icon, .q-count-bar { display: none !important; }
            .chapter-section { box-shadow: none; border: none; margin-bottom: 40px; }
            .chapter-section.folded .knowledge-container { display: block !important; }
            .knowledge-item:not(.selected-for-print) { display: none !important; }
            .chapter-section:not(.has-selected-items) { display: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>AST Knowledge Bank</h1>
        <div class="btn-group">
            <button class="add-btn" onclick="openModal()">+ Add New</button>
            <button class="print-mode-btn" id="toggleSelectBtn" onclick="toggleSelectionMode()">Select to Print</button>
            <button class="do-print-btn" onclick="executePrint()">Print to PDF</button>
        </div>
    </div>
    <div id="knowledgeLibrary"></div>
</div>

<div id="editModal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000;">
    <div style="background: white; width: 600px; max-width: 95%; border-radius: 16px; padding: 30px; box-sizing: border-box;">
        <h3 id="modalTitle">Knowledge Editor</h3>
        <input type="hidden" id="editTargetId">
        <div style="margin-bottom:15px;">
            <label>Chapter</label>
            <select id="chapSelect" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ddd;"></select>
        </div>
        <div style="margin-bottom:15px;">
            <label>LaTeX</label>
            <textarea id="latexInput" oninput="updatePreview()" style="width: 100%; height: 120px; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; font-family: monospace;"></textarea>
        </div>
        <label>Preview:</label>
        <div id="latexPreview" style="margin-top: 10px; padding: 15px; background: #f9f9f9; border: 1px dashed var(--accent); min-height: 60px;"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="closeModal()" style="flex:1; background:#eee;">Cancel</button>
            <button onclick="saveData()" style="flex:2; background:var(--primary); color:white;">Save Knowledge</button>
        </div>
    </div>
</div>

<div id="qViewerModal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000;">
    <div style="background: white; width: 900px; max-width: 95%; height: 85vh; border-radius: 16px; padding: 30px; box-sizing: border-box; display: flex; flex-direction: column;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="margin: 0;">Linked Questions</h3>
            <button onclick="closeQModal()" style="background: #f3f4f6; border: 1px solid #ddd; padding: 8px 15px; border-radius: 6px; cursor: pointer;">Close</button>
        </div>
        <div id="qViewerContent" style="flex: 1; overflow-y: auto; padding-right: 10px;"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC_5NX6W0yZY8INI1gtRoMiBRZD28qJ7dE",
        authDomain: "uestc-4720a.firebaseapp.com",
        projectId: "uestc-4720a",
        appId: "1:937055851089:web:0a0fcd9b547b9daa7c9e70"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let chapters = [];
    let knowledgeBase = [];
    let qCounts = {}; // Stores { knowledgeId: count }

    async function init() {
        await fetchData();
        renderUI();
    }

    async function fetchData() {
        // 1. Fetch Categories
        const catSnap = await getDocs(collection(db, "Category"));
        chapters = catSnap.docs.map(d => ({ id: d.id, ...d.data() }))
                             .filter(c => c.parent).sort((a, b) => (a.order || 0) - (b.order || 0));

        // 2. Fetch Knowledge
        const knSnap = await getDocs(collection(db, "Knowledge"));
        knowledgeBase = knSnap.docs.map(d => ({ id: d.id, ...d.data() }))
                                    .sort((a, b) => (a.order || 0) - (b.order || 0));

        // 3. Fetch Questions to count links
        const qSnap = await getDocs(collection(db, "MathQuestion"));
        qCounts = {};
        qSnap.docs.forEach(doc => {
            const ids = doc.data().knowledgeIds || [];
            ids.forEach(id => {
                qCounts[id] = (qCounts[id] || 0) + 1;
            });
        });

        document.getElementById('chapSelect').innerHTML = chapters.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    }

    function renderUI() {
        const lib = document.getElementById('knowledgeLibrary');
        lib.innerHTML = "";

        // Find max question count for scaling the bars
        const maxQ = Math.max(...Object.values(qCounts), 1);

        chapters.forEach(chap => {
            const items = knowledgeBase.filter(k => k.categoryId === chap.id);
            if (items.length === 0) return;

            const section = document.createElement('div');
            section.className = "chapter-section";
            section.id = `sec-${chap.id}`;
            
            let itemsHtml = items.map(item => {
                const count = qCounts[item.id] || 0;
                const barWidth = (count / maxQ) * 100; // Percentage of the widest possible bar

                return `
                <div class="knowledge-item" id="item-${item.id}">
                    <div class="q-count-bar" style="width: ${barWidth}%"></div>
                    <input type="checkbox" class="print-checkbox item-check" data-chap="${chap.id}" 
                           onchange="syncPrintClass('${item.id}')">
                    <div class="content-display">$${item.latex}$</div>
                    <div class="item-actions">
                        <button class="action-btn" onclick="viewLinkedQuestions('${item.id}')" style="background: var(--primary); color: white; border: none; display: flex; align-items: center;">
                            Q ${count > 0 ? `<span class="q-badge">${count}</span>` : ''}
                        </button>
                        <button class="action-btn" onclick="moveItem('${item.id}', -1)">↑</button>
                        <button class="action-btn" onclick="moveItem('${item.id}', 1)">↓</button>
                        <button class="action-btn" onclick="openEditModal('${item.id}')">Edit</button>
                        <button class="action-btn delete-btn" onclick="deleteItem('${item.id}')">Del</button>
                    </div>
                </div>
                `;
            }).join('');

            section.innerHTML = `
                <div class="chapter-banner" onclick="toggleFold('${chap.id}')">
                    <input type="checkbox" class="print-checkbox chapter-check" 
                           onclick="event.stopPropagation()" onchange="toggleChapterItems('${chap.id}', this.checked)">
                    ${chap.name}
                    <span class="fold-icon">▼</span>
                </div>
                <div class="knowledge-container">${itemsHtml}</div>
            `;
            lib.appendChild(section);
        });

        if (window.MathJax) MathJax.typesetPromise();
    }

    // Modal & Action functions (Same as previous, just ensure they are on window)
    window.toggleFold = (chapId) => document.getElementById(`sec-${chapId}`).classList.toggle('folded');
    window.toggleSelectionMode = () => {
        document.body.classList.toggle('selection-mode');
        document.getElementById('toggleSelectBtn').innerText = 
            document.body.classList.contains('selection-mode') ? "Cancel Selection" : "Select to Print";
    };
    window.toggleChapterItems = (chapId, isChecked) => {
        const checkboxes = document.querySelectorAll(`.item-check[data-chap="${chapId}"]`);
        checkboxes.forEach(cb => {
            cb.checked = isChecked;
            syncPrintClass(cb.closest('.knowledge-item').id.replace('item-', ''));
        });
    };
    window.syncPrintClass = (itemId) => {
        const el = document.getElementById(`item-${itemId}`);
        const section = el.closest('.chapter-section');
        el.classList.toggle('selected-for-print', el.querySelector('.item-check').checked);
        section.classList.toggle('has-selected-items', section.querySelectorAll('.selected-for-print').length > 0);
    };
    window.executePrint = () => {
        if (document.querySelectorAll('.selected-for-print').length === 0) return alert("Select items first.");
        window.print();
    };
    window.openModal = () => {
        document.getElementById('editTargetId').value = "";
        document.getElementById('modalTitle').innerText = "Add New Knowledge";
        document.getElementById('latexInput').value = "";
        document.getElementById('latexPreview').innerHTML = "";
        document.getElementById('editModal').style.display = 'flex';
    };
    window.openEditModal = (id) => {
        const item = knowledgeBase.find(k => k.id === id);
        document.getElementById('editTargetId').value = id;
        document.getElementById('modalTitle').innerText = "Edit Knowledge";
        document.getElementById('latexInput').value = item.latex;
        document.getElementById('chapSelect').value = item.categoryId;
        updatePreview();
        document.getElementById('editModal').style.display = 'flex';
    };
    window.closeModal = () => document.getElementById('editModal').style.display = 'none';
    window.updatePreview = () => {
        const val = document.getElementById('latexInput').value;
        const out = document.getElementById('latexPreview');
        out.innerHTML = val ? '$' + val + '$' : "";
        if (window.MathJax) MathJax.typesetPromise([out]);
    };
    window.saveData = async () => {
        const id = document.getElementById('editTargetId').value;
        const latex = document.getElementById('latexInput').value;
        const catId = document.getElementById('chapSelect').value;
        if (id) await updateDoc(doc(db, "Knowledge", id), { latex, categoryId: catId });
        else await addDoc(collection(db, "Knowledge"), { latex, categoryId: catId, order: Date.now() });
        closeModal();
        await init();
    };
    window.deleteItem = async (id) => {
        if (confirm("Delete this?")) {
            await deleteDoc(doc(db, "Knowledge", id));
            await init();
        }
    };
    window.moveItem = async (id, direction) => {
        const idx = knowledgeBase.findIndex(k => k.id === id);
        const targetIdx = idx + direction;
        if (targetIdx < 0 || targetIdx >= knowledgeBase.length) return;
        const current = knowledgeBase[idx];
        const swap = knowledgeBase[targetIdx];
        await updateDoc(doc(db, "Knowledge", current.id), { order: swap.order || 0 });
        await updateDoc(doc(db, "Knowledge", swap.id), { order: current.order || 0 });
        await init();
    };

    // Question Viewer Logic
    window.closeQModal = () => document.getElementById('qViewerModal').style.display = 'none';
    window.toggleSolution = (btn, qId) => {
        const solDiv = document.getElementById(`sol-${qId}`);
        const hidden = solDiv.style.display === 'none';
        solDiv.style.display = hidden ? 'block' : 'none';
        btn.innerText = hidden ? "Hide Solution" : "S (Show Solution)";
        if (hidden && window.MathJax) MathJax.typesetPromise([solDiv]);
    };
    window.viewLinkedQuestions = async (kId) => {
        const container = document.getElementById('qViewerContent');
        container.innerHTML = "<p>Loading...</p>";
        document.getElementById('qViewerModal').style.display = 'flex';
        const qRef = collection(db, "MathQuestion");
        const qSnap = await getDocs(query(qRef, where("knowledgeIds", "array-contains", kId)));
        if (qSnap.empty) {
            container.innerHTML = "<p>No questions found.</p>";
            return;
        }
        container.innerHTML = qSnap.docs.map((docSnap, i) => {
            const data = docSnap.data();
            const qId = docSnap.id;
            return `
                <div style="border: 1px solid #e5e7eb; border-radius: 12px; padding: 25px; margin-bottom: 25px; background: #fff;">
                    <div style="font-weight: bold; color: var(--primary); margin-bottom: 12px;">Question ${i+1}</div>
                    <div style="font-size: 1.1rem; margin-bottom: 20px;">$${data.latexQuestion}$</div>
                    ${data.diagramUrl ? `<img src="${data.diagramUrl}" style="max-width: 100%; margin-bottom: 20px;">` : ""}
                    <button onclick="toggleSolution(this, '${qId}')" style="background: #fffbe6; border: 1px solid #ffe58f; padding: 6px 12px; cursor: pointer;">S (Show Solution)</button>
                    <div id="sol-${qId}" style="display: none; padding: 20px; background: #f6ffed; margin-top: 15px;">$${data.latexSolution}$</div>
                </div>
            `;
        }).join('');
        if (window.MathJax) MathJax.typesetPromise([container]);
    };

    init();
</script>
</body>
</html>
