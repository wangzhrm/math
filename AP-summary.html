<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Math Analytics Dashboard</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA9ku4gWV0D08ugIETMevoLBNeft4hNWUk",
            authDomain: "ap-math-8783b.firebaseapp.com",
            projectId: "ap-math-8783b",
            storageBucket: "ap-math-8783b.firebasestorage.app",
            messagingSenderId: "357604958030",
            appId: "1:357604958030:web:b4bcd12bc9cccfefd6081f",
            measurementId: "G-JEREWFTDN3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        window.db = db;
        window.getDocs = getDocs;
        window.collection = collection;
        window.query = query;
        window.orderBy = orderBy;

        if (typeof window.startApp === "function") {
            window.startApp();
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary: #1890ff; --bg: #f0f2f5; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; }
        .top-row { display: flex; gap: 20px; margin-bottom: 20px; align-items: stretch; }
        .filter-bar { background: var(--card); padding: 15px 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex: 4; gap: 15px; align-items: flex-end; }
        .filter-group { flex: 1; }
        .filter-group label { display: block; font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .filter-group select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ddd; background: #fff; font-size: 13px; }
        .stat-mini-card { background: var(--primary); color: white; padding: 10px 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(24, 144, 255, 0.3); flex: 1; display: flex; flex-direction: column; justify-content: center; text-align: center; min-width: 150px; }
        .stat-mini-card p { margin: 2px 0 0; font-size: 28px; font-weight: bold; }
        .full-card { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .chart-container { height: 400px; width: 100%; position: relative; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 12px; color: #999; padding: 12px; border-bottom: 2px solid #f0f0f0; text-transform: uppercase; }
        td { padding: 15px 12px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .btn-reset { padding: 10px 15px; background: #f5f5f5; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-bottom: 20px;">AP Math Analytics Dashboard</h2>

    <div class="top-row">
        <div class="filter-bar">
            <div class="filter-group">
                <label>Year</label>
                <select id="yearFilter" onchange="applyFilters()"><option value="">All Years</option></select>
            </div>
            <div class="filter-group">
                <label>Section</label>
                <select id="sectionFilter" onchange="applyFilters()"><option value="">All Sections</option></select>
            </div>
            <div class="filter-group">
                <label>Chapter</label>
                <select id="chapterFilter" onchange="applyFilters()"><option value="">All Chapters</option></select>
            </div>
            <button class="btn-reset" onclick="resetFilters()">Reset</button>
        </div>

        <div class="stat-mini-card">
            <h3 style="font-size:11px; margin:0; opacity:0.9;">MATCHING QUESTIONS</h3>
            <p id="total-q">0</p>
        </div>
    </div>

    <div class="full-card">
        <h4 style="margin-top:0; color: #555;">Chapter Distribution (Weightage)</h4>
        <div class="chart-container"><canvas id="pieChart"></canvas></div>
    </div>

    <div class="full-card">
        <h4 style="margin-top:0; color: #555;">Sequential Chapter Breakdown</h4>
        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">Seq</th>
                    <th>Chapter Name</th>
                    <th style="text-align:center">Questions</th>
                    <th style="text-align:right">Weight (%)</th>
                </tr>
            </thead>
            <tbody id="chapter-body"></tbody>
        </table>
    </div>
</div>

<script>
    let rawQuestions = [];
    let categories = [];
    let chartInst = null;

    window.startApp = async () => {
        const catSnap = await window.getDocs(window.query(window.collection(window.db, "Category"), window.orderBy("order")));
        const qSnap = await window.getDocs(window.collection(window.db, "MathQuestion"));

        categories = [];
        catSnap.forEach(doc => categories.push({ id: doc.id, ...doc.data() }));
        rawQuestions = [];
        qSnap.forEach(doc => rawQuestions.push({ id: doc.id, ...doc.data() }));

        populateFilters();
        applyFilters();
    };

    function populateFilters() {
        const ySel = document.getElementById('yearFilter');
        const sSel = document.getElementById('sectionFilter');
        const cSel = document.getElementById('chapterFilter');

        // Identify Root Buckets by name
        const yearRoot = categories.find(c => c.name.toLowerCase().includes("year") && !c.parent);
        const sectionRoot = categories.find(c => c.name.toLowerCase().includes("section") && !c.parent);
        const chapterRoot = categories.find(c => c.name.toLowerCase().includes("chapter") && !c.parent);

        categories.forEach(cat => {
            const parentId = (cat.parent && typeof cat.parent === 'object') ? cat.parent.id : cat.parent;
            if (!parentId) return; // Skip roots themselves

            const opt = `<option value="${cat.id}">${cat.name}</option>`;
            
            // Route to dropdown based on Parent ID
            if (yearRoot && parentId === yearRoot.id) {
                ySel.innerHTML += opt;
            } else if (sectionRoot && parentId === sectionRoot.id) {
                sSel.innerHTML += opt;
            } else if (chapterRoot && parentId === chapterRoot.id) {
                cSel.innerHTML += opt;
            }
        });
    }

    window.applyFilters = () => {
        const yVal = document.getElementById('yearFilter').value;
        const sVal = document.getElementById('sectionFilter').value;
        const cVal = document.getElementById('chapterFilter').value;

        const filtered = rawQuestions.filter(q => {
            const qCats = q.categories || [];
            return (!yVal || qCats.includes(yVal)) && 
                   (!sVal || qCats.includes(sVal)) && 
                   (!cVal || qCats.includes(cVal));
        });

        updateUI(filtered);
    };

    function updateUI(filteredData) {
        const total = filteredData.length;
        document.getElementById('total-q').innerText = total;

        const chapterRoot = categories.find(c => c.name.toLowerCase().includes("chapter") && !c.parent);
        
        const chapterStats = categories.filter(cat => {
            const parentId = (cat.parent && typeof cat.parent === 'object') ? cat.parent.id : cat.parent;
            return chapterRoot && parentId === chapterRoot.id;
        }).map(cat => {
            const count = filteredData.filter(q => (q.categories || []).includes(cat.id)).length;
            const weight = total > 0 ? ((count / total) * 100).toFixed(1) : "0.0";
            return { name: cat.name, count, weight };
        });

        const tbody = document.getElementById('chapter-body');
        tbody.innerHTML = chapterStats.map((s, i) => `
            <tr>
                <td style="color:#bbb; font-weight: bold;">${i + 1}</td>
                <td><strong>${s.name}</strong></td>
                <td style="text-align:center">${s.count}</td>
                <td style="text-align:right; color:var(--primary); font-weight:bold">${s.weight}%</td>
            </tr>
        `).join('');

        renderPieChart(chapterStats.filter(s => s.count > 0));
    }

    function renderPieChart(activeStats) {
        if (chartInst) chartInst.destroy();
        const ctx = document.getElementById('pieChart').getContext('2d');
        if (activeStats.length === 0) { ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height); return; }

        chartInst = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: activeStats.map(s => s.name),
                datasets: [{
                    data: activeStats.map(s => s.count),
                    backgroundColor: ['#1890ff', '#52c41a', '#722ed1', '#faad14', '#ff4d4f', '#13c2c2', '#eb2f96', '#fa8c16']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
        });
    }

    window.resetFilters = () => {
        document.getElementById('yearFilter').value = "";
        document.getElementById('sectionFilter').value = "";
        document.getElementById('chapterFilter').value = "";
        applyFilters();
    };
</script>
</body>
</html>
