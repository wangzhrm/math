<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Knowledge Library - Print Selection</title>
    
    <script>
        window.MathJax = { 
            tex: { 
                inlineMath: [['$', '$']], 
                displayMath: [['$$', '$$']] 
            } 
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { --primary: #722ed1; --bg: #f0f2f5; --text: #1f2937; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; }
        .container { max-width: 900px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; gap: 10px; flex-wrap: wrap; }
        .btn-group { display: flex; gap: 10px; }
        
        button { padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; border: none; }
        .add-btn { background: var(--primary); color: white; }
        .print-mode-btn { background: #fa8c16; color: white; }
        .do-print-btn { background: #52c41a; color: white; display: none; }
        
        .chapter-section { background: white; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e5e7eb; }
        .chapter-banner { background: #f8fafc; padding: 18px 25px; font-size: 1.3rem; font-weight: 800; color: var(--primary); border-bottom: 2px solid #f1f5f9; display: flex; align-items: center; gap: 12px; }
        
        .knowledge-container { padding: 10px 25px; }
        .knowledge-item { padding: 15px 0; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 15px; }
        .knowledge-item:last-child { border-bottom: none; }
        
        .content-display { font-size: 1.1rem; flex-grow: 1; }
        .item-actions { display: flex; gap: 5px; }
        .action-btn { background: #fff; border: 1px solid #d1d5db; padding: 4px 8px; border-radius: 4px; font-size: 11px; }

        /* Selection Mode Styles */
        .print-checkbox { display: none; width: 20px; height: 20px; cursor: pointer; }
        body.selection-mode .print-checkbox { display: inline-block; }
        body.selection-mode .item-actions, body.selection-mode .add-btn { display: none; }
        body.selection-mode .do-print-btn { display: inline-block; }

        /* Modal Styles */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; width: 600px; max-width: 90%; border-radius: 16px; padding: 30px; }
        textarea { width: 100%; height: 120px; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; }

        /* PRINT STYLES - This handles the PDF generation */
        @media print {
            body { background: white; padding: 0; }
            .header, .item-actions, .add-btn, .print-mode-btn, .do-print-btn, .print-checkbox, .action-btn { display: none !important; }
            .chapter-section { box-shadow: none; border: none; page-break-inside: avoid; }
            .knowledge-item { border-bottom: 1px solid #eee; }
            /* Hide chapters and items that were NOT selected */
            .knowledge-item:not(.selected-for-print) { display: none !important; }
            .chapter-section:not(.has-selected-items) { display: none !important; }
            .chapter-banner { border-bottom: 2px solid #333; color: black; padding-left: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Knowledge Bank</h1>
        <div class="btn-group">
            <button class="add-btn" onclick="openModal()">+ Add New</button>
            <button class="print-mode-btn" id="toggleSelectBtn" onclick="toggleSelectionMode()">Select to Print</button>
            <button class="do-print-btn" onclick="executePrint()">Print Selected to PDF</button>
        </div>
    </div>
    <div id="knowledgeLibrary"></div>
</div>

<div id="editModal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="modalTitle">Knowledge Editor</h3>
        <input type="hidden" id="editTargetId">
        <div style="margin-bottom:15px;">
            <label>Chapter</label>
            <select id="chapSelect" style="width:100%; padding:10px;"></select>
        </div>
        <div style="margin-bottom:15px;">
            <label>LaTeX</label>
            <textarea id="latexInput" oninput="updatePreview()"></textarea>
        </div>
        <div id="latexPreview" style="padding:15px; background:#f9f9f9; border:1px dashed #722ed1; min-height:40px;"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="closeModal()" style="flex:1; background:#eee;">Cancel</button>
            <button onclick="saveData()" style="flex:2; background:var(--primary); color:white;">Save</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA9ku4gWV0D08ugIETMevoLBNeft4hNWUk",
        authDomain: "ap-math-8783b.firebaseapp.com",
        projectId: "ap-math-8783b",
        storageBucket: "ap-math-8783b.firebasestorage.app",
        messagingSenderId: "357604958030",
        appId: "1:357604958030:web:b4bcd12bc9cccfefd6081f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let chapters = [];
    let knowledgeBase = [];

    async function init() {
        await fetchData();
        renderUI();
    }

    async function fetchData() {
        const catSnap = await getDocs(collection(db, "Category"));
        const allCats = catSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        const root = allCats.find(c => c.name && c.name.toLowerCase().includes("chapter") && !c.parent);
        
        if (root) {
            chapters = allCats.filter(c => {
                const pid = (c.parent && typeof c.parent === 'object') ? c.parent.id : c.parent;
                return pid === root.id;
            }).sort((a, b) => (a.order || 0) - (b.order || 0));
        }

        const knoSnap = await getDocs(collection(db, "Knowledge"));
        knowledgeBase = knoSnap.docs.map(d => ({ id: d.id, ...d.data() }))
                                    .sort((a, b) => (a.order || 0) - (b.order || 0));

        document.getElementById('chapSelect').innerHTML = chapters.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    }

    function renderUI() {
        const lib = document.getElementById('knowledgeLibrary');
        lib.innerHTML = "";

        chapters.forEach(chap => {
            const items = knowledgeBase.filter(k => k.categoryId === chap.id);
            const section = document.createElement('div');
            section.className = "chapter-section";
            section.id = `section-${chap.id}`;
            
            let itemsHtml = items.map(item => `
                <div class="knowledge-item" id="item-${item.id}">
                    <input type="checkbox" class="print-checkbox item-check" data-chap="${chap.id}" onchange="syncPrintClass('${item.id}')">
                    <div class="content-display">$${item.latex}$</div>
                    <div class="item-actions">
                        <button class="action-btn" onclick="moveItem('${item.id}', -1)">↑</button>
                        <button class="action-btn" onclick="moveItem('${item.id}', 1)">↓</button>
                        <button class="action-btn" onclick="openEditModal('${item.id}')">Edit</button>
                    </div>
                </div>
            `).join('');

            section.innerHTML = `
                <div class="chapter-banner">
                    <input type="checkbox" class="print-checkbox chapter-check" onchange="toggleChapterItems('${chap.id}', this.checked)">
                    ${chap.name}
                </div>
                <div class="knowledge-container">${itemsHtml || '<p style="color:#999">No items</p>'}</div>
            `;
            lib.appendChild(section);
        });
        if (window.MathJax) MathJax.typesetPromise();
    }

    // --- SELECTION & PRINT LOGIC ---
    window.toggleSelectionMode = () => {
        const body = document.body;
        const btn = document.getElementById('toggleSelectBtn');
        body.classList.toggle('selection-mode');
        btn.innerText = body.classList.contains('selection-mode') ? "Cancel Selection" : "Select to Print";
    };

    window.toggleChapterItems = (chapId, isChecked) => {
        const checkboxes = document.querySelectorAll(`.item-check[data-chap="${chapId}"]`);
        checkboxes.forEach(cb => {
            cb.checked = isChecked;
            const itemId = cb.closest('.knowledge-item').id.replace('item-', '');
            syncPrintClass(itemId);
        });
    };

    window.syncPrintClass = (itemId) => {
        const el = document.getElementById(`item-${itemId}`);
        const cb = el.querySelector('.item-check');
        const section = el.closest('.chapter-section');
        
        if (cb.checked) el.classList.add('selected-for-print');
        else el.classList.remove('selected-for-print');

        // Check if the parent section has ANY selected items
        const hasAny = section.querySelectorAll('.selected-for-print').length > 0;
        if (hasAny) section.classList.add('has-selected-items');
        else section.classList.remove('has-selected-items');
    };

    window.executePrint = () => {
        const selectedCount = document.querySelectorAll('.selected-for-print').length;
        if (selectedCount === 0) return alert("Please select at least one item to print.");
        window.print();
    };

    // --- MODAL & DATA LOGIC ---
    window.openModal = () => {
        document.getElementById('editTargetId').value = "";
        document.getElementById('modalTitle').innerText = "Add New Knowledge";
        document.getElementById('latexInput').value = "";
        document.getElementById('editModal').style.display = 'flex';
    };

    window.openEditModal = (id) => {
        const item = knowledgeBase.find(k => k.id === id);
        document.getElementById('editTargetId').value = id;
        document.getElementById('modalTitle').innerText = "Edit Knowledge";
        document.getElementById('latexInput').value = item.latex;
        document.getElementById('chapSelect').value = item.categoryId;
        updatePreview();
        document.getElementById('editModal').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('editModal').style.display = 'none';

    window.updatePreview = () => {
        const val = document.getElementById('latexInput').value;
        const out = document.getElementById('latexPreview');
        out.innerHTML = val ? '$' + val + '$' : "";
        if (window.MathJax) MathJax.typesetPromise([out]);
    };

    window.saveData = async () => {
        const id = document.getElementById('editTargetId').value;
        const latex = document.getElementById('latexInput').value;
        const catId = document.getElementById('chapSelect').value;
        if (id) await updateDoc(doc(db, "Knowledge", id), { latex: latex, categoryId: catId });
        else await addDoc(collection(db, "Knowledge"), { latex: latex, categoryId: catId, order: knowledgeBase.length, createdAt: new Date() });
        closeModal();
        await init();
    };

    window.moveItem = async (id, direction) => {
        const idx = knowledgeBase.findIndex(k => k.id === id);
        const targetIdx = idx + direction;
        if (targetIdx < 0 || targetIdx >= knowledgeBase.length) return;
        const current = knowledgeBase[idx];
        const swap = knowledgeBase[targetIdx];
        await updateDoc(doc(db, "Knowledge", current.id), { order: targetIdx });
        await updateDoc(doc(db, "Knowledge", swap.id), { order: idx });
        await init();
    };

    init();
</script>
</body>
</html>
