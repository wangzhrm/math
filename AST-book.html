<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilingual CMS Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --sidebar-bg: #2c3e50; --accent: #27ae60; --danger: #e74c3c; --text-light: #ecf0f1; }
        body { display: flex; height: 100vh; margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        
        /* LEFT: Navigator */
        #nav-sidebar { width: 350px; background: var(--sidebar-bg); color: var(--text-light); overflow-y: auto; padding: 20px; border-right: 1px solid #444; }
        .nav-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; border-radius: 4px; transition: 0.2s; margin: 2px 0; }
        .nav-item:hover { background: #34495e; }
        
        /* Tree Hierarchy Styling */
        .level-book { font-weight: bold; color: #3498db; margin-top: 15px; border-bottom: 1px solid #444; }
        .level-chapter { margin-left: 15px; color: #bdc3c7; border-left: 1px solid #555; }
        .level-section { margin-left: 30px; font-size: 0.9em; color: #abb2b9; border-left: 1px solid #555; }
        .level-page { margin-left: 45px; font-size: 0.85em; color: var(--accent); border-left: 1px solid #555; cursor: pointer; }
        .level-page:hover span { text-decoration: underline; }

        /* Action Buttons (Edit/Delete) */
        .actions { display: flex; gap: 5px; opacity: 0.4; transition: opacity 0.2s; }
        .nav-item:hover .actions { opacity: 1; }
        .btn-icon { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px; }
        .btn-edit { color: #f1c40f; } 
        .btn-del { color: #e74c3c; }

        /* CENTER: Viewer */
        #viewer { flex: 1; display: flex; flex-direction: column; background: #f4f7f6; }
        #viewer-header { padding: 15px 25px; background: white; border-bottom: 1px solid #ddd; }
        .pane-container { display: flex; flex: 1; overflow: hidden; gap: 10px; padding: 10px; }
        .pane { flex: 1; overflow-y: auto; background: white; padding: 25px; border-radius: 8px; border: 1px solid #ddd; }
        .sentence { padding: 10px; margin: 4px 0; cursor: pointer; border-radius: 5px; border-left: 4px solid transparent; }
        .active-pair { background: #e3f2fd !important; border-left-color: #2196f3 !important; }

        /* RIGHT: Manager Panel */
        #creator-sidebar { width: 360px; background: #fff; border-left: 1px solid #ddd; padding: 20px; overflow-y: auto; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }
        .field { margin-bottom: 15px; background: #f9f9f9; padding: 12px; border-radius: 6px; border: 1px solid #eee; }
        label { display: block; font-size: 0.7rem; font-weight: bold; margin-bottom: 5px; color: #666; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        textarea { height: 180px; font-family: monospace; font-size: 0.8em; }
        
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-save { background: var(--accent); }
        .btn-cancel { background: #95a5a6; }
        .mode-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .mode-create { background: #dff9fb; color: #2980b9; }
        .mode-edit { background: #fef9e7; color: #f39c12; }
    </style>
</head>
<body>

    <div id="nav-sidebar">
        <h3>My Library</h3>
        <div id="tree">Loading...</div>
    </div>

    <div id="viewer">
        <div id="viewer-header">
            <h2 id="current-page-title" style="margin:0">Select a page</h2>
        </div>
        <div class="pane-container">
            <div class="pane" id="zh-pane"></div>
            <div class="pane" id="en-pane"></div>
        </div>
    </div>

    <div id="creator-sidebar">
        <div class="panel-header">
            <h3 style="margin:0">Manager</h3>
            <span id="form-mode" class="mode-badge mode-create">Create Mode</span>
        </div>
        
        <div class="field">
            <label>Item Type</label>
            <select id="item-type" onchange="updateFormUI()">
                <option value="book">Book</option>
                <option value="chapter">Chapter</option>
                <option value="section">Section</option>
                <option value="page">Page</option>
            </select>
        </div>

        <div class="field" id="parent-field-container">
            <label>Parent Item</label>
            <select id="parent-select"></select>
        </div>

        <div class="field">
            <label>Title / Name</label>
            <input type="text" id="item-title" placeholder="Enter title...">
        </div>

        <div class="field">
            <label>Order Index (Sort Order)</label>
            <input type="number" id="item-order" value="0" placeholder="e.g. 1, 2, 3...">
            <small style="color:#999">Lower numbers appear first</small>
        </div>

        <div id="json-field-container" class="field" style="display:none;">
            <label>JSON Content</label>
            <textarea id="item-json" placeholder='[{"id":"s1", "zh":"...", "en":"..."}]'></textarea>
        </div>

        <div class="btn-row">
            <button class="btn-save" onclick="handleSave()">Save</button>
            <button class="btn-cancel" onclick="resetForm()">Clear / New</button>
        </div>
    </div>

<script>
    // --- CONFIGURATION ---
    const _supabaseUrl = 'https://fepooifleoeseapsbisy.supabase.co';
    const _supabaseKey = 'sb_publishable_2dWpQ1VOvdSToPTXymandw_VOSZUpTy';
    const supabaseClient = supabase.createClient(_supabaseUrl, _supabaseKey);

    // Global State
    let libraryData = [];
    let editingId = null; // If null, we are creating. If set, we are updating.

    // 1. DATA LOADING & SORTING
    async function loadLibrary() {
        document.getElementById('tree').innerText = "Refreshing...";
        
        // We select order_index to sort properly
        const { data, error } = await supabaseClient
            .from('edu_app_bilingual_books')
            .select(`
                id, book_title, order_index,
                edu_app_bilingual_chapters (
                    id, chapter_title, order_index, book_id,
                    edu_app_bilingual_sections (
                        id, section_title, order_index, chapter_id,
                        edu_app_bilingual_pages (
                            id, page_title, order_index, section_id, content_json
                        )
                    )
                )
            `)
            .order('order_index', { ascending: true }); // Sorts books

        if (error) {
            console.error(error);
            document.getElementById('tree').innerText = "Error loading. Check console.";
            return;
        }

        libraryData = data || [];
        renderTree();
        updateFormUI(); // Refresh parent dropdowns
    }

    function renderTree() {
        const tree = document.getElementById('tree');
        tree.innerHTML = '';

        // Helper to sort children
        const sortItems = (arr) => (arr || []).sort((a,b) => (a.order_index || 0) - (b.order_index || 0));

        libraryData.forEach(book => {
            tree.appendChild(createNode(book.book_title, 'level-book', 'book', book));
            
            sortItems(book.edu_app_bilingual_chapters).forEach(ch => {
                tree.appendChild(createNode(ch.chapter_title, 'level-chapter', 'chapter', ch));
                
                sortItems(ch.edu_app_bilingual_sections).forEach(sec => {
                    tree.appendChild(createNode(sec.section_title, 'level-section', 'section', sec));
                    
                    sortItems(sec.edu_app_bilingual_pages).forEach(pg => {
                        const node = createNode(pg.page_title, 'level-page', 'page', pg);
                        // Only click title to view, ignore buttons
                        node.querySelector('span').onclick = () => renderPage(pg);
                        tree.appendChild(node);
                    });
                });
            });
        });
    }

    // Creates the HTML for one tree item
    function createNode(title, cssClass, type, dataObj) {
        const div = document.createElement('div');
        div.className = `nav-item ${cssClass}`;
        div.innerHTML = `
            <span>${title}</span>
            <div class="actions">
                <button class="btn-icon btn-edit" title="Edit" onclick="startEdit('${type}', '${dataObj.id}')">✏️</button>
                <button class="btn-icon btn-del" title="Delete" onclick="deleteItem('${type}', '${dataObj.id}')">🗑️</button>
            </div>
        `;
        return div;
    }

    // 2. FORM & UI LOGIC
    function updateFormUI() {
        const type = document.getElementById('item-type').value;
        const parentContainer = document.getElementById('parent-field-container');
        const parentSelect = document.getElementById('parent-select');
        const jsonContainer = document.getElementById('json-field-container');

        // Show/Hide JSON field
        jsonContainer.style.display = (type === 'page') ? 'block' : 'none';

        // Configure Parent Dropdown
        parentSelect.innerHTML = '';
        if (type === 'book') {
            parentContainer.style.display = 'none';
        } else {
            parentContainer.style.display = 'block';
            
            // Populate Dropdown based on hierarchy
            if (type === 'chapter') {
                libraryData.forEach(b => {
                    parentSelect.innerHTML += `<option value="${b.id}">${b.book_title}</option>`;
                });
            } else if (type === 'section') {
                libraryData.forEach(b => (b.edu_app_bilingual_chapters || []).forEach(c => {
                    parentSelect.innerHTML += `<option value="${c.id}">${b.book_title} > ${c.chapter_title}</option>`;
                }));
            } else if (type === 'page') {
                libraryData.forEach(b => (b.edu_app_bilingual_chapters || []).forEach(c => (c.edu_app_bilingual_sections || []).forEach(s => {
                    parentSelect.innerHTML += `<option value="${s.id}">${c.chapter_title} > ${s.section_title}</option>`;
                })));
            }
        }
    }

    function resetForm() {
        editingId = null;
        document.getElementById('form-mode').innerText = "Create Mode";
        document.getElementById('form-mode').className = "mode-badge mode-create";
        document.getElementById('item-title').value = '';
        document.getElementById('item-order').value = '0';
        document.getElementById('item-json').value = '';
        document.getElementById('item-type').disabled = false; // Allow changing type
        updateFormUI();
    }

    // 3. ACTIONS (Edit / Delete / Save)
    
    // Triggered when clicking Pencil ✏️
    window.startEdit = function(type, id) {
        editingId = id;
        document.getElementById('form-mode').innerText = "Edit Mode";
        document.getElementById('form-mode').className = "mode-badge mode-edit";
        
        // Lock the type so you can't turn a Book into a Page
        const typeSelect = document.getElementById('item-type');
        typeSelect.value = type;
        typeSelect.disabled = true; 
        updateFormUI();

        // Find the data object in memory
        let found = null;
        if(type === 'book') found = libraryData.find(x => x.id === id);
        else if(type === 'chapter') libraryData.forEach(b => (b.edu_app_bilingual_chapters||[]).forEach(x => {if(x.id===id) found=x}));
        else if(type === 'section') libraryData.forEach(b => (b.edu_app_bilingual_chapters||[]).forEach(c => (c.edu_app_bilingual_sections||[]).forEach(x => {if(x.id===id) found=x})));
        else if(type === 'page') libraryData.forEach(b => (b.edu_app_bilingual_chapters||[]).forEach(c => (c.edu_app_bilingual_sections||[]).forEach(s => (s.edu_app_bilingual_pages||[]).forEach(x => {if(x.id===id) found=x}))));

        if (found) {
            document.getElementById('item-title').value = found.book_title || found.chapter_title || found.section_title || found.page_title;
            document.getElementById('item-order').value = found.order_index || 0;
            
            // Set Parent ID if applicable
            const parentId = found.book_id || found.chapter_id || found.section_id;
            if (parentId) document.getElementById('parent-select').value = parentId;

            // Set JSON if page
            if (type === 'page' && found.content_json) {
                document.getElementById('item-json').value = JSON.stringify(found.content_json, null, 2);
            }
        }
    };

    // Triggered when clicking Save
    window.handleSave = async function() {
        const type = document.getElementById('item-type').value;
        const title = document.getElementById('item-title').value;
        const order = document.getElementById('item-order').value;
        const parentId = document.getElementById('parent-select').value;
        const table = `edu_app_bilingual_${type}s`;

        if (!title) return alert("Title is required");

        // Construct Data Payload
        const payload = { order_index: parseInt(order) };
        if (type === 'book') payload.book_title = title;
        if (type === 'chapter') { payload.chapter_title = title; payload.book_id = parentId; }
        if (type === 'section') { payload.section_title = title; payload.chapter_id = parentId; }
        if (type === 'page') { 
            payload.page_title = title; 
            payload.section_id = parentId;
            try {
                payload.content_json = JSON.parse(document.getElementById('item-json').value);
            } catch(e) { return alert("Invalid JSON format"); }
        }

        let error;
        if (editingId) {
            // Update Existing
            const res = await supabaseClient.from(table).update(payload).eq('id', editingId);
            error = res.error;
        } else {
            // Create New
            const res = await supabaseClient.from(table).insert([payload]);
            error = res.error;
        }

        if (error) alert("Error: " + error.message);
        else {
            resetForm();
            loadLibrary();
        }
    };

    // Triggered when clicking Trash 🗑️
    window.deleteItem = async function(type, id) {
        if (!confirm(`Are you sure you want to delete this ${type}? (All children will be deleted)`)) return;
        
        const table = `edu_app_bilingual_${type}s`;
        const { error } = await supabaseClient.from(table).delete().eq('id', id);
        
        if (error) alert("Error deleting: " + error.message);
        else loadLibrary();
    };

    // 4. VIEWER RENDER
    function renderPage(page) {
        document.getElementById('current-page-title').innerText = page.page_title;
        const zhPane = document.getElementById('zh-pane');
        const enPane = document.getElementById('en-pane');
        zhPane.innerHTML = ''; enPane.innerHTML = '';

        (page.content_json || []).forEach(item => {
            const zhEl = document.createElement('div'); zhEl.className = 'sentence'; zhEl.innerHTML = item.zh;
            const enEl = document.createElement('div'); enEl.className = 'sentence'; enEl.innerHTML = item.en;

            const sync = () => {
                document.querySelectorAll('.active-pair').forEach(el => el.classList.remove('active-pair'));
                zhEl.classList.add('active-pair'); enEl.classList.add('active-pair');
                zhEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                enEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            };
            zhEl.onclick = sync; enEl.onclick = sync;
            zhPane.appendChild(zhEl); enPane.appendChild(enEl);
        });
    }

    // Start
    loadLibrary();
</script>
</body>
</html>
